<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Soft subtle decorative halo of sacred light/geometry -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#B07D1C" stroke-width="1.2" stroke-dasharray="2, 2" opacity="0.5"/>
  <circle cx="16" cy="16" r="11.5" fill="none" stroke="#B07D1C" stroke-width="0.8" opacity="0.25"/>

  <!-- Veena components group, centered and angled elegantly -->
  <g transform="rotate(-10, 16, 16)">
    <!-- Small Gourd (Headstock resonator) -->
    <circle cx="21.5" cy="11.5" r="3" fill="#8D6E63"/>
    <circle cx="21.5" cy="11.5" r="2.2" fill="#B07D1C"/>

    <!-- Veena Neck (Dandi) -->
    <path d="M 8.5 23.5 L 23.5 8.5" stroke="#8D6E63" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Soundboard / Frets underneath string line -->
    <path d="M 10 22 L 22 10" stroke="#B07D1C" stroke-width="0.8" stroke-opacity="0.7"/>
    
    <!-- Parallel Golden Strings -->
    <path d="M 9.5 22.5 L 22.5 9.5" stroke="#FCE8B2" stroke-width="0.6"/>
    <path d="M 8.5 23.5 L 21.5 10.5" stroke="#F5D782" stroke-width="0.4" opacity="0.85"/>
    
    <!-- Peacock/Saraswati traditional styling at resonator neck joint -->
    <circle cx="11.5" cy="20.5" r="1.5" fill="#C29200" opacity="0.75"/>
    
    <!-- Main Resonator (Big Kudam gourd - bottom-left) -->
    <circle cx="8.5" cy="23.5" r="5.8" fill="#8D6E63"/>
    <circle cx="8.5" cy="23.5" r="4.6" fill="#B07D1C"/>
    
    <!-- Concentric golden visual ring on the resonator face -->
    <circle cx="8.5" cy="23.5" r="2.6" fill="none" stroke="#FCE8B2" stroke-width="0.8" stroke-opacity="0.8"/>
    <circle cx="8.5" cy="23.5" r="1" fill="#8D6E63"/>
    
    <!-- Elegant curving Yaali head (traditional terminal scroll) -->
    <path d="M 23.5 8.5 C 24.5 7.5, 26 7, 26.5 8.5 C 27 10, 25 10.5, 24 10" fill="none" stroke="#B07D1C" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Adjusting pegs design detail -->
    <circle cx="22.5" cy="7.5" r="0.8" fill="#C29200"/>
    <circle cx="20.5" cy="9.5" r="0.8" fill="#C29200"/>
  </g>
</svg>
